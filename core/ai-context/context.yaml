# 单文件版 ai-context（推荐）。旧的分文件方式仍兼容，但新项目建议用此文件。
# 合并 project-map + business-rules + error-catalog + coding-rules
# 维护者：Phase 2 架构设计阶段填写，后续持续更新

# ============================================================
# SECTION 1: 项目模块地图 (project-map)
# Agent 在 Phase 2/3 自动加载此文件，理解模块边界和依赖关系
# ============================================================

project:
  name: "<!-- 项目名 -->"
  architecture: "<!-- layered-monolith / microservices / modular-monolith -->"
  language: "<!-- java-17 / java-21 -->"
  framework: "<!-- spring-boot-3.x -->"

modules:
  # 示例模块（请按实际项目替换）
  # - name: order-module
  #   responsibility: "订单创建、状态流转、查询"
  #   expose:
  #     - "POST /api/v1/orders"
  #     - "GET /api/v1/orders/{id}"
  #   forbidden:
  #     - "直接访问其他模块的 Repository"
  #   dependsOn:
  #     - "user-module"
  #     - "payment-module"

# ============================================================
# SECTION 2: 业务规则清单 (business-rules)
# Agent 在 Phase 3 每个切片前读取此部分，确定幂等/缓存/一致性/并发约束
# ============================================================

business_rules:
  # 示例规则（按实际业务填写）
  # order-creation:
  #   idempotency-key: "requestId"
  #   unique-index: "uk_order_request_id"
  #   consistency: "db-transaction + outbox"
  #   cache-policy: "no-cache"

  # order-query:
