  #   timeout: "10s"

# ============================================================
# SECTION 3: 错误目录 (error-catalog)
# 每个线上问题、回归缺陷都应在此追加一条记录
# Agent 在 Phase 4 + 生产问题定位时读取此部分
# ============================================================

errors:
  # 示例错误（按实际系统填写）
  # DUPLICATE_REQUEST:
  #   cause: "重复 requestId 导致幂等命中"
  #   action: "返回已有结果，不重复处理"
  #   http_status: 200
  #   log_level: "INFO"
  #
  # INSUFFICIENT_BALANCE:
  #   cause: "余额/额度不足"
  #   action: "返回错误码 + 引导充值"
  #   http_status: 402
  #   log_level: "WARN"
  #
  # DOWNSTREAM_TIMEOUT:
  #   cause: "下游服务超时"
