# 迭代元信息

iteration: 迭代名称（简短中文或英文）
version: 版本号（如 v1.0, v1.1）
start_date: YYYY-MM-DD（迭代启动日期）
target_date: YYYY-MM-DD（预计完成日期）
status: in_progress  # in_progress | completed | archived

# 本次迭代影响的模块列表
modules_affected:
  - module-a
  - module-b

# 一句话描述本次迭代的核心目标
summary: 实现 xxx 功能，支持 yyy 能力

# 可选：关联的外部信息
external_refs:
  prd_url: ""          # 外部 PRD 链接（如有）
  issue_url: ""        # Issue/需求卡片链接（如有）
  figma_url: ""        # 设计稿链接（如有）

# 本次迭代中的临时方案 / 已知限制
# Agent 在开发过程中发现"先凑合这么干"的地方，记录在这里，避免后续迭代踩坑
known_limitations: []
# 示例：
# known_limitations:
#   - id: "KL-001"
#     scope: "farvis-payment"
#     description: "支付接口为模拟实现，未对接真实支付渠道"
#     workaround: "使用 POST /api/v1/payment/simulate 模拟支付成功"
#     resolution: "后续迭代对接支付宝/微信支付时替换"

# 归档时填写（status 改为 archived 时）
archive_info:
  archive_date: YYYY-MM-DD  # 实际归档日期
  actual_duration_days: 0   # 实际耗时天数
  retrospective: ""         # 一句话复盘（做得好的/待改进的）
