# Prometheus 抓取配置 —— 本地开发用
#
# 使用方式：
#   1. 确保应用以 local profile 启动（actuator 已暴露 /actuator/prometheus）
#   2. docker run -d --name prometheus -p 9090:9090 \
#        -v $(pwd)/prometheus.yml:/etc/prometheus/prometheus.yml \
#        prom/prometheus
#   3. 访问 http://localhost:9090

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: local

scrape_configs:
  - job_name: 'spring-boot-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']   # Docker 内访问宿主机
        labels:
          application: 'app'
          profile: 'local'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
