# Docker Compose — Java 项目标准化本地开发环境
#
# 使用方式：
#   启动：docker compose up -d
#   停止：docker compose down
#   初始化数据：首次启动后执行 init-sql/ 下的脚本
#
# 约定：
#   - MySQL 8.0.36，端口 3306
#   - Redis 7.2，端口 6379
#   - WireMock 3.x（外部 API 模拟），端口 8089
#   - 按需启用 Kafka / RabbitMQ

version: "3.9"

services:
  # ========== 必备依赖 ==========

  mysql:
    image: mysql:8.0.36
    container_name: harness-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
    ports:
      - "3306:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --innodb-buffer-pool-size=512M
      - --max-connections=500
    volumes:
      - ./init-sql:/docker-entrypoint-initdb.d
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.2
    container_name: harness-redis
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --appendonly yes
      - --maxmemory-policy allkeys-lru
      - --maxmemory 256mb
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ========== 外部 API 模拟 ==========

  wiremock:
    image: wiremock/wiremock:3.6.0
    container_name: harness-wiremock
    ports:
      - "8089:8080"
    volumes:
      - ./wiremock/stubs:/home/wiremock/mappings
      - ./wiremock/__files:/home/wiremock/__files
    command: --verbose

  # ========== 消息队列（按需启用）==========

  # kafka:
  #   image: bitnami/kafka:3.7
  #   container_name: harness-kafka
  #   ports:
  #     - "9092:9092"
  #   environment:
  #     KAFKA_CFG_NODE_ID: 1
  #     KAFKA_CFG_PROCESS_ROLES: broker,controller
  #     KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
  #     KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
  #     KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
  #     KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
  #     KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER

  # rabbitmq:
  #   image: rabbitmq:3.12-management
  #   container_name: harness-rabbitmq
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"
  #   environment:
  #     RABBITMQ_DEFAULT_USER: admin
  #     RABBITMQ_DEFAULT_PASS: admin

volumes:
  mysql-data:
  redis-data:
